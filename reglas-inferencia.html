<h2 id="introducci%C3%B3n">Introducción</h2>
<p>Las <strong>reglas de inferencia</strong> especifican qué <strong>juicios de tipo</strong> son válidos</p>
<ul>
<li>Definen la semántica de tipado de un lenguaje</li>
<li>Cada regla tiene premisas (arriba) y una conclusión (abajo)</li>
<li>Se combinan para construir derivaciones</li>
</ul>

<h2 id="suma-en-rust">Suma en Rust</h2>
<p><code>sum(i32, bool)</code> equivale a un <code>enum</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rust"><span class="hljs-keyword">enum</span> <span class="hljs-title class_">Respuesta</span> {
    <span class="hljs-title function_ invoke__">Numerica</span>(<span class="hljs-type">i32</span>), <span class="hljs-comment">// @0</span>
    <span class="hljs-title function_ invoke__">Valor</span>(<span class="hljs-type">bool</span>),   <span class="hljs-comment">// @1</span>
}

<span class="hljs-keyword">let</span> <span class="hljs-variable">e</span>: Respuesta = Respuesta::<span class="hljs-title function_ invoke__">Numerica</span>(<span class="hljs-number">33</span>); <span class="hljs-comment">// @0 33 </span>

<span class="hljs-keyword">let</span> <span class="hljs-variable">res</span> = <span class="hljs-keyword">match</span> e { <span class="hljs-comment">// sumcase e of (f_0: u32, f_1: u32) =&gt; res: u32</span>
    Respuesta::<span class="hljs-title function_ invoke__">Numerica</span>(v) =&gt; { <span class="hljs-title function_ invoke__">f_0</span>() },
    Respuesta::<span class="hljs-title function_ invoke__">Valor</span>(v)    =&gt; { <span class="hljs-title function_ invoke__">f_1</span>() },
} 
</code></pre>
<p>El <code>match</code> de Rust es exactamente la <strong>eliminación de la suma</strong> con clausura exhaustiva</p>
<p><strong><code>sum()</code></strong> — suma vacía → <code>enum SumaVacia {}</code> → tipo <strong><code>!</code></strong> (never)</p>
<blockquote>
<p><strong><code>unit</code></strong> ≠ <strong><code>empty</code></strong>: <code>unit</code> expresa <em>ausencia de información</em>; <code>empty</code> representa <em>imposibilidad</em></p>
</blockquote>

<h2 id="rustbelt">RustBelt</h2>
<p>Rust tiene un modelo formal que respalda la solidez de su sistema de tipos</p>
<p><strong>RustBelt</strong> (Jung et al., POPL 2018) provee una interpretación semántica para:</p>
<ul>
<li>Tipos producto (tuplas)</li>
<li>Préstamos (<em>borrowing</em>) y <em>lifetimes</em></li>
<li>Propiedad (<em>ownership</em>)</li>
</ul>
<blockquote>
<p>Securing the Foundations of the Rust Programming Language</p>
